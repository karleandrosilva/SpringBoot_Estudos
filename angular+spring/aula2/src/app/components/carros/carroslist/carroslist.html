<br>

<div class="container">

    <div class="row">

        <div class="col-lg-12">

            <div class="card">
                <div class="card-body">
                    <table border="1" class="table table-striped">

                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Nome</th>
                            </tr>
                        </thead>

                        <tbody>

                            @for (carro of lista; track $index) {
                                <tr>
                                <td>{{carro.id}}</td>
                                <td>{{carro.nome}}</td>
                            </tr>
                            }
                            
                        </tbody>

                    </table>
                </div>
            </div>

        </div>

    </div>

</div>
